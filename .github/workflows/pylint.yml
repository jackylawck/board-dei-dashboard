name: Pylint Quality Audit

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies (安裝必要套件)
      run: |
        python -m pip install --upgrade pip
        pip install pylint
        pip install -r requirements.txt
        
    - name: Analysing the code with pylint (執行程式碼品質稽核)
      run: |
        # 使用 pylint 進行掃描，並設定容錯機制
        pylint $(git ls-files '*.py') --disable=all --enable=E,F,W,unreachable,duplicate-code --exit-zero
